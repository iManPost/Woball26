<html>
<head>
<title>Player </title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,shrink-to-fit=no">

<!-- DPlayer + dash.js (เปลี่ยนตัวเล่นวีดีโอใหม่ - รองรับ DASH streaming + DRM ClearKey) -->
<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/dplayer@1.27.1/dist/DPlayer.min.css">
<script src="//cdn.jsdelivr.net/npm/dashjs@4.7.1/dist/dash.all.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/dplayer@1.27.1/dist/DPlayer.min.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    background-color: #000000;
    height: 100%;
}
#player {
    width: 100%;
    height: 100vh;
}
</style>
</head>
<body>

<div id="player"></div>

<script>
  // ===== ค่าเดิมจากไฟล์ต้นฉบับ (คงไว้ตามเดิม) =====
  var SOURCE_URL = 'https://dash2.antik.sk/stream/nvidia_joj_sport/playlist_cenc.mpd';
  var CLEARKEY_ID  = '11223344556677889900112233445566';
  var CLEARKEY_KEY = '4b80724d0ef86bcb2c21f7999d67739d';
  // ================================================

  const dp = new DPlayer({
      container: document.getElementById('player'),
      autoplay: true,
      theme: '#ff0',
      screenshot: true,
      hotkey: true,
      preload: 'auto',
      volume: 0.8,
      mutex: true,
      video: {
          url: SOURCE_URL,
          type: 'customDash',
          customType: {
              // ตัวจัดการสำหรับ DASH streaming + DRM ClearKey (ทดแทน Clappr เดิม)
              customDash: function (video, player) {
                  const dashPlayer = dashjs.MediaPlayer().create();
                  dashPlayer.initialize(video, SOURCE_URL, true);
                  dashPlayer.setProtectionData({
                      'org.w3.clearkey': {
                          clearkeys: {
                              [CLEARKEY_ID]: CLEARKEY_KEY
                          }
                      }
                  });
                  player.dash = dashPlayer;
              },
          },
      },
  });
</script>

</html>
