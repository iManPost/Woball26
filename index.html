<html>
<head>
<title>Player </title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,shrink-to-fit=no">

<!-- Artplayer + dash.js (เปลี่ยนตัวเล่นวีดีโอใหม่ - รองรับ DASH streaming + DRM ClearKey) -->
<script src="//cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
<script src="//cdn.jsdelivr.net/npm/dashjs@4.7.1/dist/dash.all.min.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    background-color: #000000;
    height: 100%;
}
#player {
    width: 100%;
    height: 100vh;
}
</style>
</head>
<body>

<div id="player"></div>

<script>
  // ===== ค่าเดิมจากไฟล์ต้นฉบับ (คงไว้ตามเดิม) =====
  var SOURCE_URL = 'https://dash2.antik.sk/stream/nvidia_joj_sport/playlist_cenc.mpd';
  var CLEARKEY_ID  = '11223344556677889900112233445566';
  var CLEARKEY_KEY = '4b80724d0ef86bcb2c21f7999d67739d';
  // ================================================

  const art = new Artplayer({
      container: '#player',
      url: SOURCE_URL,
      type: 'dash',
      autoplay: true,
      autoSize: true,
      autoMini: true,
      setting: true,
      fullscreen: true,
      fullscreenWeb: true,
      pip: true,
      playbackRate: true,
      aspectRatio: true,
      screenshot: true,
      lock: true,
      miniProgressBar: true,
      mutex: true,
      backdrop: true,
      theme: '#ff0',

      // ตัวจัดการสำหรับ DASH streaming + DRM ClearKey (ทดแทน Clappr เดิม)
      customType: {
          dash: function (video, url) {
              const dashPlayer = dashjs.MediaPlayer().create();
              dashPlayer.initialize(video, url, true);
              dashPlayer.setProtectionData({
                  'org.w3.clearkey': {
                      clearkeys: {
                          [CLEARKEY_ID]: CLEARKEY_KEY
                      }
                  }
              });
              art.dash = dashPlayer;
          },
      },
  });
</script>

</body>
</html>
